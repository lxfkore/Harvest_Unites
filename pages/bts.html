<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Behind the Scenes | Harvest Unites Enterprise Sdn. Bhd.</title>
  <meta name="description" content="See Harvest Unites Enterprise in action — behind the scenes of our delivery and processing operations." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components/btn.css" />
  <link rel="stylesheet" href="../css/pages/bts.css" />
</head>
<body>

  <div
    id="navbar-root"
    data-navbar-variant="dark"
    data-base="../"
  ></div>

  <!-- ========== MAIN ========== -->
  <main class="bts-page">

    <!-- Full page background image -->
    <div class="bts-page__bg" aria-hidden="true"></div>

    <div class="container bts-page__content">

      <div class="bts-grid">

        <!-- Card 1 -->
        <article class="bts-card">
          <div class="bts-card__thumb">
            <img
              src="../assets/images/bts-thumb-1.jpg"
              alt="DRUM and IBC Tank Delivery Service"
              class="bts-card__img"
            />
            <button
              class="bts-card__play"
              aria-label="Play DRUM and IBC Tank Delivery Service video"
              data-video-src="../assets/videos/bts-video-1.mp4"
              data-video-title="Harvest Unites Enterprise's DRUM & IBC Tank Delivery Service"
            >
              <svg viewBox="0 0 48 48" aria-hidden="true">
                <circle cx="24" cy="24" r="24" fill="rgba(0,0,0,0.45)"/>
                <polygon points="19,14 36,24 19,34" fill="white"/>
              </svg>
            </button>
          </div>
          <p class="bts-card__title">Harvest Unites Enterprise's DRUM &amp; IBC Tank Delivery Service...</p>
        </article>

        <!-- Card 2 -->
        <article class="bts-card">
          <div class="bts-card__thumb">
            <img
              src="../assets/images/bts-thumb-2.jpg"
              alt="Our Processing Session"
              class="bts-card__img"
            />
            <button
              class="bts-card__play"
              aria-label="Play Our Processing Session video"
              data-video-src="../assets/videos/bts-video-2.mp4"
              data-video-title="Harvest Unites: Our Processing Session"
            >
              <svg viewBox="0 0 48 48" aria-hidden="true">
                <circle cx="24" cy="24" r="24" fill="rgba(0,0,0,0.45)"/>
                <polygon points="19,14 36,24 19,34" fill="white"/>
              </svg>
            </button>
          </div>
          <p class="bts-card__title">Harvest Unites: Our Processing Session</p>
        </article>

        <!-- Card 3: placeholder -->
        <article class="bts-card bts-card--empty">
          <div class="bts-card__thumb bts-card__thumb--placeholder">
            <span aria-hidden="true">▶</span>
          </div>
          <p class="bts-card__title bts-card__title--muted">Coming Soon</p>
        </article>

        <!-- Card 4: placeholder -->
        <article class="bts-card bts-card--empty">
          <div class="bts-card__thumb bts-card__thumb--placeholder">
            <span aria-hidden="true">▶</span>
          </div>
          <p class="bts-card__title bts-card__title--muted">Coming Soon</p>
        </article>

      </div>
    </div>
  </main>

  <!-- ========== VIDEO MODAL ========== -->
  <div class="video-modal" id="videoModal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="video-modal__backdrop" id="videoModalBackdrop"></div>
    <div class="video-modal__inner">
      <div class="video-modal__header">
        <p class="video-modal__title" id="videoModalTitle"></p>
        <button class="video-modal__close" id="videoModalClose" aria-label="Close video">&#x2715;</button>
      </div>
      <div class="video-modal__player">
        <video id="videoPlayer" controls preload="none" class="video-modal__video"></video>
      </div>
    </div>
  </div>

  <div id="footer-root" data-base="../"></div>

  <script src="../js/main.js"></script>
  <script src="../js/components/navbar.js"></script>
   <script src="../js/components/whatsapp.js"></script>
  <script src="../js/components/footer.js"></script>
  <script src="../js/components/modal.js"></script>

</body>
</html>
